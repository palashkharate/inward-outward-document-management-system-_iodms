# Nginx Configuration for IODMS Frontend
# -----------------------------------------
# This file tells Nginx two things:
# 1. Serve the React static files (HTML/CSS/JS) for normal page requests
# 2. Forward any /api/* requests to the Python backend container

server {
    listen 80;
    server_name localhost;

    # Serve the React frontend files
    # The built React app lives in /usr/share/nginx/html (copied during Docker build)
    location / {
        root /usr/share/nginx/html;
        index index.html;

        # This is critical for React Router (single-page app):
        # If the user navigates to /log-inward or /admin directly,
        # Nginx won't find a real file at that path. This line tells Nginx
        # to always serve index.html and let React handle the routing.
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api requests to the Python backend container
    # When the browser requests /api/inward/register, Nginx forwards it
    # to http://backend:8000/api/inward/register
    # "backend" is the hostname of the backend container defined in docker-compose.yml
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Allow large file uploads (scanned documents can be up to 50 MB)
        client_max_body_size 50M;
    }
}
